<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelCraft Studio - Multimedia Agency</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="agency-nav">
        <div class="logo">Pixel<span>Craft</span></div>
        <button class="contact-btn">Let's Talk</button>
    </nav>

    <section class="agency-hero">
        <h1>We Craft Digital <span class="gradient">Masterpieces</span></h1>
        <p>আমরা গ্রাফিক ডিজাইন, ভিডিও এডিটিং এবং মাল্টিমিডিয়া সল্যুশনের মাধ্যমে আপনার ব্র্যান্ডকে নিয়ে যাই এক অনন্য উচ্চতায়।</p>
        <div class="scroll-badge">Explore Our Work <i class="fas fa-arrow-down"></i></div>
    </section>

    <section class="work-section">
        <h2>Our Creative Gallery</h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                <i class="fas fa-palette"></i>
                <h3>Brand Identity</h3>
            </div>
            <div class="gallery-item">
                <i class="fas fa-video"></i>
                <h3>Motion Graphics</h3>
            </div>
            <div class="gallery-item">
                <i class="fas fa-bullhorn"></i>
                <h3>Digital UI Design</h3>
            </div>
        </div>
    </section>
<script src="./js/script.js"></script>
</body>
</html>
